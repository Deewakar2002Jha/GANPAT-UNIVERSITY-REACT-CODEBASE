<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card</title>
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        
        .id-card {
            width: 350px;
            height: 580px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            border: 1px solid #dbe2e6;
        }

        
        .header {
            background: linear-gradient(135deg, #0f2b5c, #1a4a94);
            color: white;
            padding: 16px;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin: 0;
        }
        .clg-name {
            font-size: 11px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }

        
        .card-title {
            background-color: #f1f5f9;
            color: #0f2b5c;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            padding: 6px 0;
            letter-spacing: 2px;
            border-bottom: 1px solid #e2e8f0;
        }

        
        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        
        .student-photo {
            width: 115px;
            height: 140px;
            border: 2px solid #1a4a94;
            border-radius: 8px;
            margin-bottom: 12px;
            object-fit: cover;
            display: block;
        }

        
        .student-name {
            font-size: 22px;
            font-weight: 700;
            color: #0f2b5c;
            margin: 5px 0 8px 0;
        }

        
        .student-dept {
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            background-color: #1a4a94;
            padding: 5px 20px;
            border-radius: 20px;
            margin-bottom: 18px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(26, 74, 148, 0.2);
        }

        .details-table {
            width: 90%;
            margin: 0 auto;
            border-collapse: collapse;
        }
        .details-table td {
            padding: 6px 0;
            font-size: 14px;
            vertical-align: middle;
        }
        .label {
            font-weight: 700;
            color: #64748b;
            text-transform: capitalize;
            width: 45%;
            text-align: left;
        }
        .value {
            font-weight: 600;
            color: #1e293b;
            text-align: left;
        }


        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }


        .emergency-box {
            font-size: 11px;
            color: #334155;
            line-height: 1.5;
            text-align: left;
        }
        .emergency-box strong {
            color: #0f2b5c;
        }

        .signature-section {
            text-align: center;
            font-size: 11px;
            color: #475569;
            font-weight: 600;
        }
        .sig-line {
            width: 90px;
            border-top: 1px solid #475569;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>


    <div class="id-card">
        

        <div class="header">
            <div class="logo">AMPICS</div>
            <div class="clg-name">Acharya Motibahi Patel Institute of Computer Applications</div>
        </div>


        <div class="card-title">STUDENT ID CARD</div>


        <div class="card-body">
            

            <img src="c:\Users\Vimal\Pictures\miti.jpeg" alt="Student Photo" class="student-photo">


            <div class="student-name">Mitika Modi</div>


            <div class="student-dept">B.C.A. Hons.</div>


            <table class="details-table">
                <tr>
                    <td class="label">Enrollment No:</td>
                    <td class="value">24032211191</td>
                </tr>
                <tr>
                    <td class="label">Date of Birth:</td>
                    <td class="value">24/08/2006</td>
                </tr>
                <tr>
                    <td class="label">Valid Up To:</td>
                    <td class="value">June 2027</td>
                </tr>
            </table>

        </div>

        
        <div class="footer">
            <div class="emergency-box">
                <strong>Blood Group:</strong> O+<br>
                <strong>Emergency:</strong> +91 98765 43210
            </div>
            
            <div class="signature-section">
                <div class="sig-line"></div>
                <div>Principal Sig</div>
            </div>
        </div>

    </div>

</body>
</html>
